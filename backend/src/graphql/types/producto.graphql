# Viene desde modulo de inventario
"""Informacion de un producto disponible en inventario."""
type Producto {
  """Codigo unico del producto."""
  codigo: String!
  """Nombre del producto."""
  nombre: String!
  """Descripcion detallada del producto."""
  descripcion: String
  """Cantidad disponible actualmente en Inventario."""
  stockActual: Int!
  """Precio de venta publico (PVP)."""
  pvp: Float!
  """Indica si el producto grava IVA."""
  grabaIva: Boolean!
  """Porcentaje de IVA aplicado por Inventario."""
  porcentajeIvaAplicado: Float!
}

"""Consultas disponibles para productos."""
type Query {
  """Devuelve la lista completa de productos disponibles en Inventario."""
  productos: [Producto!]!
}
