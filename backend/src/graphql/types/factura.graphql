scalar DateTime

type DetalleFactura {
  id: ID!
  productoCodigo: String!
  productoNombre: String!
  cantidad: Int!
  precioUnitario: Float!
  grabaIva: Boolean!
  subtotalLinea: Float!
}

type Factura {
  id: ID!
  numeroFactura: String!
  clienteId: String!
  cliente: ClienteResumen
  tipoPago: String!
  fechaEmision: DateTime!
  subtotal: Float!
  totalIva: Float!
  total: Float!
  estado: String!
  detalles: [DetalleFactura!]!
}

type Facturas {
  totalCount: Int!
  pageInfo: PageInfo!
  items: [Factura!]!
}

input DetalleInput {
  productoCodigo: String!
  cantidad: Int!
}

input CrearFacturaInput {
  clienteId: String!
  tipoPago: String!
  detalles: [DetalleInput!]!
}

"""
Criterios de filtrado y búsqueda unificados para la consulta de facturas.
"""
input FacturasFilter {
  """
  Filtra por el estado actual de la factura.
  Valores válidos: 'Emitida', 'Anulada', 'Pagada'.
  """
  estado: String

  """
  Filtra las facturas pertenecientes a un cliente específico mediante su UUID.
  """
  clienteId: String

  """
  Filtra por la modalidad de pago de la transacción.
  Valores esperados: 'Efectivo', 'Crédito'.
  """
  tipoPago: String

  """
  Realiza una coincidencia parcial (LIKE) 
  únicamente sobre el campo 'numeroFactura' (Ej: '001-001').
  """
  search: String
}

# Módulo de Facturas
type Query {
  facturas(filter: FacturasFilter, page: Int, limit: Int): Facturas!
  factura(id: ID!): Factura
}

# Operaciones de Facturas
type Mutation {
  crearFactura(input: CrearFacturaInput!): Factura!
  actualizarEstadoFactura(id: ID!, estado: String!): Factura!
}