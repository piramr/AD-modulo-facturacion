info:
  title: "API de Facturación y Clientes"
  version: "1.0.0"
  description: |
    Bienvenido a la documentación oficial de la API.

    Antes de comenzar a realizar pruebas, necesitas configurar tu entorno de desarrollo.

    ---

    ### Autenticación de Pruebas

    Para consumir los endpoints protegidos, puedes generar un JSON Web Token (JWT) temporal (24h):

    **Endpoint de Token**
    https://ad-modulo-facturacion.onrender.com/auth/test-token

    **Ejemplo de uso**

    ```bash
    curl -X POST https://ad-modulo-facturacion.onrender.com/auth/test-token \
      -H "Content-Type: application/json"
    ```

    ---

    ### Entorno de Pruebas

    Si prefieres armar tus consultas visualmente y probar los resolvers en tiempo real:

    Apollo Sandbox:
    https://ad-modulo-facturacion.onrender.com/graphql

    Nota:
    Añade el token generado en las cabeceras:

    ```json
    {
      "Authorization": "Bearer TU_TOKEN"
    }
    ``` 

servers:
  - url: "https://ad-modulo-facturacion.onrender.com/graphql"
    description: "Servidor de Producción / Staging (Render)"